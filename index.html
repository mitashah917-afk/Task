
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: targets1.mind;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      <a-assets>
        <img id="card" src="MYQR.jpeg" />
        <a-asset-item id="avatarModel" src="Penguin.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model rotation="-270 0 0 " position="0 0.6 0.2" scale="0.8 0.8 0.8" src="#avatarModel"></a-gltf-model>
        <a-box position="0 0 0.1" rotation="0 -90 0" color="black" scale="0.8 0.8 0.8"></a-box>
      </a-entity>
    </a-scene>
  </body>
</html>
